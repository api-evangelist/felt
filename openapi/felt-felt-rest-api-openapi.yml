tags:
- description: 'Maps are the centerpiece of Felt.


    With these APIs, you can create, retrieve, update, delete, move, and duplicate
    maps programmatically.

    '
  name: Maps
  x-page-description: APIs for building maps
  x-page-icon: map-location
- description: 'Layers enable you to visualize, style and interact with your spatial
    data.


    With these APIs, you can upload data, manage layer styling, publish and refresh
    live data layers.

    '
  name: Layers
  x-page-description: APIs to visualize spatial data
  x-page-icon: layer-group
- description: 'With these APIs, you can upload your data to create new layers.

    '
  name: Layer Uploads
  x-page-description: APIs to upload data
  x-page-icon: layer-group
  x-parent: Layers
- description: 'With these APIs, you can publish your layers to your workspace library.

    '
  name: Layer Library
  x-page-description: APIs to publish layers
  x-page-icon: layer-group
  x-parent: Layers
- description: 'With these APIs, you can export data to CSV, GeoJSON, and other formats.

    '
  name: Layer Exports
  x-page-description: APIs to export layer data
  x-page-icon: layer-group
  x-parent: Layers
- description: 'Elements enable you to annotate maps with custom shapes, text, and
    markers.


    With these APIs, you can create, update, and delete map elements.

    '
  name: Elements
  x-page-description: APIs for drawing spatially
  x-page-icon: shapes
- description: 'Users represent the people in your workspace.


    With these APIs, you can retrieve user profile information.

    '
  name: Users
  x-page-description: APIs for user information
  x-page-icon: user
- description: 'Comments bring conversations to mapping.


    With these APIs, you can export, resolve, and delete map comments and collaboration
    threads.

    '
  name: Comments
  x-page-description: APIs for programatic collaboration
  x-page-icon: comment
- description: 'Embed tokens enable safely sharing your private maps.


    With these APIs, you can generate secure tokens for embedding maps.

    '
  name: Embed Tokens
  x-page-description: APIs to share maps securely
  x-page-icon: code
- description: 'Sources connect your databases to Felt.


    With these APIs, you can configure data source connections, credentials, and sync
    settings to create live maps.

    '
  name: Sources
  x-page-description: APIs to connect your data
  x-page-icon: database
- description: 'Projects help you organize maps and manage team permissions.


    With these APIs, you can manage the projects in your workspace.

    '
  name: Projects
  x-page-description: APIs to organize maps
  x-page-icon: folder
