        to an S3 bucket.


        The response to this API request will include a URL and pre-signed params
        for you to use to upload your file. Only a single file may be uploaded — if
        you wish to upload several files at once, consider wrapping them in a zip
        file.


        To upload the file, you must perform a multipart upload, and include the file
        contents in the `file` field.


        {% hint style="info" %}

        With the `felt_python` library, you can upload a file with a simple function
        call:

        {% endhint %}


